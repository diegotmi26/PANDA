<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Gemini Flash</title>
    <style>
        /* Estética "Nerd Chic" / Industrial */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f0f0f; /* Preto profundo */
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
        }

        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 8px; max-width: 80%; }
        .user-msg { 
            background-color: #1e1e1e; 
            border-left: 4px solid #6200ea; /* Roxo Neon */
            align-self: flex-end; 
            margin-left: auto;
        }
        .ai-msg { 
            background-color: #262626; 
            border-left: 4px solid #00e5ff; /* Turquesa/Neon */
            align-self: flex-start; 
        }

        #input-area { 
            padding: 20px; 
            background: #161616; 
            display: flex; 
            border-top: 1px solid #333;
        }

        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #333; 
            border-radius: 5px; 
            background: #0a0a0a; 
            color: #00ffcc; /* Texto Neon */
            outline: none;
        }

        button { 
            margin-left: 10px; 
            padding: 10px 25px; 
            cursor: pointer; 
            background: #6200ea; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #7c4dff; box-shadow: 0 0 10px #6200ea; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai-msg">Sistemas online. Como posso ajudar com o Gemini Flash hoje?</div>
    </div>
    
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite seu comando...">
        <button id="send-btn">EXECUTAR</button>
    </div>

    <script type="module">
        // Importando o SDK via CDN para funcionar direto no Netlify
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // COLOQUE SUA CHAVE AQUI
        const API_KEY = "SUA_API_KEY_AQUI"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        // CONFIGURAÇÃO DO MODELO FLASH
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash", // Versão Flash estável e ultra rápida
            generationConfig: {
                maxOutputTokens: 1000,
                temperature: 0.7,
            }
        });

        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const prompt = inputField.value;
            if (!prompt) return;

            // Interface do Usuário
            chatContainer.innerHTML += `<div class="message user-msg"><b>VOCÊ:</b><br>${prompt}</div>`;
            inputField.value = '';
